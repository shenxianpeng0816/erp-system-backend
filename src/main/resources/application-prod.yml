server:
  port: 8080
  servlet:
    context-path: /api
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_URL}:3306/erp_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.erp.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      # 注意：不在全局配置逻辑删除，避免影响没有 status 字段的实体
      # 逻辑删除：User / Product 使用 @TableLogic；Customer 用 status 字段由 API 按角色过滤

jwt:
  secret: ${JWT_SECRET}
  expiration: 14400000   # 4 hours in ms

file:
  upload-dir: ${FILE_UPLOAD_DIR:/root/uploads}

logging:
  level:
    com.erp: debug
